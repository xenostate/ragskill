<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-RAG — AI-ассистент для вашего сайта</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f6f6f6;
            --surface: #ffffff;
            --surface2: #ededef;
            --border: #dcdce0;
            --text: #47464d;
            --text2: #7a7a85;
            --text3: #a5a5b0;
            --accent: #fb742d;
            --accent-hover: #fc8a4f;
            --accent-glow: rgba(251, 116, 45, 0.10);
            --accent-glow2: rgba(251, 116, 45, 0.05);
            --green: #22c55e;
            --red: #ef4444;
            --radius: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ── Top bar ── */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(246,246,246,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .logo {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--accent); }

        .lang-switch {
            display: flex;
            gap: 2px;
            background: var(--surface);
            border-radius: 8px;
            padding: 3px;
            border: 1px solid var(--border);
        }

        .lang-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--text2);
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: var(--accent);
            color: #fff;
        }

        .lang-btn:hover:not(.active) { color: var(--text); }

        /* ── Landing page ── */
        .landing { display: block; }
        .landing.hidden { display: none; }

        /* ── Hero ── */
        .hero {
            text-align: center;
            padding: 140px 24px 60px;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(251,116,45,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero h1 {
            font-size: clamp(36px, 6vw, 58px);
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -1.5px;
            margin-bottom: 20px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .gradient-text {
            background: linear-gradient(135deg, #fb742d 0%, #e85d1a 40%, #fc8a4f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: clamp(16px, 2.2vw, 19px);
            color: var(--text2);
            line-height: 1.65;
            max-width: 540px;
            margin: 0 auto 40px;
        }

        .hero-cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 24px rgba(251,116,45,0.3);
        }

        .hero-cta:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(251,116,45,0.4);
        }

        .hero-cta svg { width: 18px; height: 18px; }

        /* ── Features ── */
        .features {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px 80px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .feature-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 24px;
            text-align: center;
            transition: border-color 0.3s, transform 0.3s;
        }

        .feature-card:hover {
            border-color: rgba(251,116,45,0.25);
            transform: translateY(-3px);
        }

        .feature-icon {
            width: 52px;
            height: 52px;
            margin: 0 auto 16px;
            background: var(--accent-glow);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .feature-card h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .feature-card p {
            font-size: 13px;
            color: var(--text2);
            line-height: 1.55;
        }

        /* ── Tutorial ── */
        .video-section {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 24px 80px;
            text-align: center;
        }

        .video-section h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .video-section > p {
            font-size: 15px;
            color: var(--text2);
            margin-bottom: 32px;
        }

        .tutorial-steps {
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .tutorial-step {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.3s;
        }

        .tutorial-step:hover { border-color: rgba(251,116,45,0.25); }

        .tutorial-num {
            min-width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 800;
            color: #fff;
        }

        .tutorial-content h4 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .tutorial-content p {
            font-size: 13px;
            color: var(--text2);
            line-height: 1.5;
        }

        /* ── Bottom CTA ── */
        .bottom-cta {
            text-align: center;
            padding: 60px 24px 100px;
            position: relative;
        }

        .bottom-cta::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(251,116,45,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .bottom-cta h2 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .bottom-cta p {
            font-size: 16px;
            color: var(--text2);
            margin-bottom: 32px;
        }

        /* ── App flow (steps) ── */
        .app { display: none; }
        .app.active { display: block; }

        .page { max-width: 560px; margin: 0 auto; padding: 100px 20px 40px; }

        /* ── Step indicator ── */
        .steps {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 40px;
        }

        .step-dot {
            width: 32px;
            height: 4px;
            border-radius: 2px;
            background: var(--border);
            transition: background 0.3s, width 0.3s;
        }

        .step-dot.active { background: var(--accent); width: 48px; }
        .step-dot.done { background: var(--green); }

        /* ── Headings ── */
        .section-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .section-sub {
            color: var(--text2);
            font-size: 15px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* ── Sections ── */
        .section { display: none; }
        .section.active { display: block; animation: fadeUp 0.4s ease; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        /* ── Form inputs ── */
        .field { margin-bottom: 16px; }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field input, .field select {
            width: 100%;
            padding: 11px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field input:focus, .field select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .field input::placeholder { color: #b0b0b8; }
        .field select option { background: var(--surface); }
        .field-row { display: flex; gap: 12px; }
        .field-row .field { flex: 1; }

        /* ── File upload ── */
        .file-drop {
            border: 1px dashed var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: border-color 0.2s, background 0.2s;
        }

        .file-drop:hover { border-color: var(--accent); background: var(--accent-glow); }

        .file-drop input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-drop-icon { font-size: 24px; margin-bottom: 4px; }
        .file-drop-text { color: var(--text2); font-size: 13px; }
        .file-list { font-size: 12px; color: var(--accent); margin-top: 6px; }
        .hint { font-size: 12px; color: #b0b0b8; margin-top: 4px; }

        /* ── Buttons ── */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--text2); color: var(--text); }

        .btn-stop { background: transparent; color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
        .btn-stop:hover { border-color: var(--red); background: rgba(239,68,68,0.08); }

        /* ── Back link ── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text2);
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
            margin-bottom: 24px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--text); }
        .back-link svg { width: 14px; height: 14px; }

        /* ── Progress ── */
        .progress-bar-track {
            width: 100%;
            height: 6px;
            background: var(--surface2);
            border-radius: 3px;
            overflow: hidden;
            margin: 20px 0 16px;
        }

        .progress-bar-val {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.3s;
            width: 0%;
        }

        .progress-bar-val.pulse {
            width: 35%;
            animation: pulse-slide 1.8s infinite ease-in-out;
        }

        @keyframes pulse-slide {
            0% { margin-left: 0; }
            50% { margin-left: 65%; }
            100% { margin-left: 0; }
        }

        .progress-status { text-align: center; font-size: 14px; color: var(--text2); }

        /* ── Chat ── */
        .chat-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 480px;
        }

        .chat-bar {
            padding: 14px 18px;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-bar small { font-weight: 400; font-size: 11px; opacity: 0.7; }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 82%;
            padding: 9px 13px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.55;
            word-wrap: break-word;
        }

        .msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 3px; }
        .msg.bot { align-self: flex-start; background: var(--surface2); color: var(--text); border-bottom-left-radius: 3px; }
        .msg.bot a { color: var(--accent-hover); }
        .msg.sys { align-self: center; background: var(--accent-glow); color: var(--accent-hover); font-size: 12px; border-radius: 6px; }

        .typing { display: none; align-self: flex-start; padding: 9px 13px; background: var(--surface2); border-radius: 10px; }
        .typing.on { display: block; }
        .typing span { display: inline-block; width: 5px; height: 5px; background: #bbb; border-radius: 50%; margin: 0 2px; animation: tbounce 1.2s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes tbounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

        .chat-foot { padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 8px; }

        .chat-foot input {
            flex: 1;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
        }

        .chat-foot input:focus { border-color: var(--accent); }

        .chat-foot button {
            width: 38px; height: 38px;
            border-radius: 50%; border: none;
            background: var(--accent); color: #fff;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }

        .chat-foot button:hover { background: var(--accent-hover); }
        .chat-foot button:disabled { opacity: 0.3; cursor: not-allowed; }
        .chat-foot button svg { width: 16px; height: 16px; }

        /* ── Activate / Widget code ── */
        .code-box {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            color: var(--green);
            word-break: break-all;
            line-height: 1.6;
            position: relative;
            cursor: pointer;
        }

        .code-box:hover { border-color: var(--accent); }

        .copy-hint {
            position: absolute; top: 8px; right: 10px;
            font-size: 10px; color: var(--text2);
            font-family: 'Inter', sans-serif;
        }

        .success-icon { text-align: center; font-size: 48px; margin-bottom: 12px; }

        /* ── Error ── */
        .err {
            background: #fff0f0;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px;
            color: #f87171;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        .err.on { display: block; }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 40px 24px;
            border-top: 1px solid var(--border);
            color: var(--text3);
            font-size: 13px;
        }

        /* ── Landing chat ── */
        .hero-chat {
            max-width: 480px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.06);
        }

        .hero-chat-body {
            height: 220px;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hero-chat-msg {
            max-width: 85%;
            padding: 9px 13px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.55;
            word-wrap: break-word;
        }

        .hero-chat-msg.bot {
            align-self: flex-start;
            background: var(--surface2);
            color: var(--text);
            border-bottom-left-radius: 3px;
        }

        .hero-chat-msg.user {
            align-self: flex-end;
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 3px;
        }

        .hero-chat-typing {
            display: none;
            align-self: flex-start;
            padding: 9px 13px;
            background: var(--surface2);
            border-radius: 10px;
        }

        .hero-chat-typing.on { display: block; }
        .hero-chat-typing span { display: inline-block; width: 5px; height: 5px; background: #bbb; border-radius: 50%; margin: 0 2px; animation: tbounce 1.2s infinite; }
        .hero-chat-typing span:nth-child(2) { animation-delay: 0.2s; }
        .hero-chat-typing span:nth-child(3) { animation-delay: 0.4s; }

        .hero-chat-foot {
            padding: 10px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }

        .hero-chat-foot input {
            flex: 1;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
        }

        .hero-chat-foot input:focus { border-color: var(--accent); }

        .hero-chat-foot button {
            width: 38px; height: 38px;
            border-radius: 50%; border: none;
            background: var(--accent); color: #fff;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .hero-chat-foot button:hover { background: var(--accent-hover); }
        .hero-chat-foot button:disabled { opacity: 0.3; cursor: not-allowed; }
        .hero-chat-foot button svg { width: 16px; height: 16px; }

        .hero-chat-label {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: var(--text3);
            border-top: 1px solid var(--border);
        }

        /* ── Responsive ── */
        @media (max-width: 700px) {
            .features { grid-template-columns: 1fr; max-width: 400px; }
            .page { padding: 90px 16px 24px; }
            .section-title { font-size: 24px; }
            .field-row { flex-direction: column; gap: 0; }
            .chat-box { height: calc(100vh - 220px); }
        }
    </style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="topbar">
    <div class="logo" id="logo-link" style="cursor:pointer;">Web<span>RAG</span> Systems</div>
    <div class="lang-switch">
        <button class="lang-btn active" data-lang="ru" onclick="setLang('ru')">RU</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" data-lang="kk" onclick="setLang('kk')">KZ</button>
    </div>
</div>

<!-- ══════════ LANDING PAGE ══════════ -->
<div class="landing" id="landing">

    <!-- Hero -->
    <section class="hero">
        <h1 data-i18n-html="heroTitle"></h1>
        <p data-i18n="heroSub"></p>
        <div class="hero-chat" id="hero-chat">
            <div class="hero-chat-body" id="lc-body">
                <div class="hero-chat-msg bot" data-i18n="lcWelcome"></div>
                <div class="hero-chat-typing" id="lc-typing"><span></span><span></span><span></span></div>
            </div>
            <div class="hero-chat-foot">
                <input id="lc-input" data-i18n-ph="lcPlaceholder">
                <button id="lc-send" onclick="sendLandingChat()">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
            <div class="hero-chat-label" data-i18n="lcLabel"></div>
        </div>
    </section>

    <!-- Features -->
    <section class="features">
        <div class="feature-card">
            <div class="feature-icon">&#128301;</div>
            <h3 data-i18n="feat1Title"></h3>
            <p data-i18n="feat1Desc"></p>
        </div>
        <div class="feature-card">
            <div class="feature-icon">&#9889;</div>
            <h3 data-i18n="feat2Title"></h3>
            <p data-i18n="feat2Desc"></p>
        </div>
        <div class="feature-card">
            <div class="feature-icon">&#127760;</div>
            <h3 data-i18n="feat3Title"></h3>
            <p data-i18n="feat3Desc"></p>
        </div>
    </section>

    <!-- Tutorial section -->
    <section class="video-section">
        <h2 data-i18n="tutorialTitle"></h2>
        <p data-i18n="tutorialSub"></p>
        <div class="tutorial-steps">
            <div class="tutorial-step">
                <div class="tutorial-num">1</div>
                <div class="tutorial-content">
                    <h4 data-i18n="tut1Title"></h4>

            trialLang: "Жауап тілі",
            trialBtn: "Индекстеуді бастау",
            trialErrUrl: "URL енгізіңіз.",
            trialErrNet: "Желі қатесі.",
            progTitle: "Индекстеу...",
            progSub: "Сайт мазмұнын сканерлеу және индекстеу жүруде. Әдетте 10-30 секунд алады.",
            progLoading: "Жүктелуде...",
            progStart: "Бастаудамыз...",
            progDone: "Дайын!",
            progError: "Қате",
            progFail: "Қате.",
            progLost: "Байланыс үзілді. Бетті жаңартып көріңіз.",
            chatTitle: "Көмекшіңіз жұмыс істеуде",
            chatSub: "Индекстелген мазмұн бойынша кез келген сұрақ қойыңыз.",
            chatReady: "Мазмұн индекстелді. Маған сұрақ қойыңыз!",
            chatPh: "Сұрақ жазыңыз...",
            chatGetCode: "Виджет кодын алу",
            chatTryAnother: "Басқа сайтты сынау",
            chatStopTrial: "Сынақ кезеңін тоқтату",
            chatStopConfirm: "Сенімдісіз бе? Барлық деректер жойылады және сіз басты бетке ораласыз.",
            chatError: "Бір нәрсе дұрыс болмады.",
            actTitle: "Көмекшіні белсендіру",
            actSub: "Сайтқа ендіру кодын алу үшін белсендіру кодын енгізіңіз.",
            actCode: "Белсендіру коды",
            actCodePh: "Кодты енгізіңіз",
            actBtn: "Белсендіру",
            actErrEmpty: "Кодты енгізіңіз.",
            actErrNet: "Желі қатесі.",
            actDone: "Белсендірілді!",
            actPaste: "Бұл кодты сайтыңыздың HTML-іне қойыңыз:",
            actCopy: "көшіру үшін басыңыз",
            actBack: "Чатқа оралу",
            logoConfirm: "Басты бетке оралғыңыз келе ме? Ағымдағы сессия барысы жоғалуы мүмкін.",
        }
    };

    let currentLang = localStorage.getItem("wr_lang") || "ru";

    function applyTranslations() {
        const t = T[currentLang];
        document.title = t.pageTitle;
        document.documentElement.lang = currentLang === "kk" ? "kk" : currentLang;

        // Text content
        document.querySelectorAll("[data-i18n]").forEach(el => {
            const key = el.getAttribute("data-i18n");
            if (t[key]) el.textContent = t[key];
        });

        // InnerHTML (for gradient spans etc.)
        document.querySelectorAll("[data-i18n-html]").forEach(el => {
            const key = el.getAttribute("data-i18n-html");
            if (t[key]) el.innerHTML = t[key];
        });

        // Placeholders
        document.querySelectorAll("[data-i18n-ph]").forEach(el => {
            const key = el.getAttribute("data-i18n-ph");
            if (t[key]) el.placeholder = t[key];
        });

        // Update lang buttons
        document.querySelectorAll(".lang-btn").forEach(b => {
            b.classList.toggle("active", b.getAttribute("data-lang") === currentLang);
        });
    }

    window.setLang = function(lang) {
        currentLang = lang;
        localStorage.setItem("wr_lang", lang);
        applyTranslations();
    };

    // Apply on load
    applyTranslations();

    // ── Logo click confirmation ──
    document.getElementById("logo-link").addEventListener("click", function() {
        const t = T[currentLang];
        const appFlow = document.getElementById("app-flow");
        // Only show confirmation if user is in the app flow (not on landing page)
        if (appFlow.classList.contains("active")) {
            if (confirm(t.logoConfirm)) {
                goLanding();
            }
        }
    });

    // ── Landing chat ──
    let landingSiteId = null;

    // Fetch landing site_id on load
    fetch(window.location.origin + "/api/landing/config")
        .then(r => r.json())
        .then(d => { if (d.site_id) landingSiteId = d.site_id; })
        .catch(() => {});

    window.sendLandingChat = async function() {
        const inp = document.getElementById("lc-input");
        const q = inp.value.trim();
        if (!q || !landingSiteId) return;

        inp.value = "";
        document.getElementById("lc-send").disabled = true;

        // Add user message
        const ud = document.createElement("div");
        ud.className = "hero-chat-msg user";
        ud.textContent = q;
        const body = document.getElementById("lc-body");
        body.insertBefore(ud, document.getElementById("lc-typing"));
        document.getElementById("lc-typing").classList.add("on");
        body.scrollTop = body.scrollHeight;

        try {
            const resp = await fetch(window.location.origin + "/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ site_id: landingSiteId, query: q }),
            });
            const data = await resp.json();

            const bd = document.createElement("div");
            bd.className = "hero-chat-msg bot";
            bd.innerHTML = data.answer
                .replace(/&/g, "&amp;").replace(/</g, "&lt;")
                .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
                .replace(/\n/g, "<br>");
            body.insertBefore(bd, document.getElementById("lc-typing"));
        } catch (e) {
            const ed = document.createElement("div");
            ed.className = "hero-chat-msg bot";
            ed.textContent = T[currentLang].chatError;
            body.insertBefore(ed, document.getElementById("lc-typing"));
        } finally {
            document.getElementById("lc-typing").classList.remove("on");
            document.getElementById("lc-send").disabled = false;
            body.scrollTop = body.scrollHeight;
            inp.focus();
        }
    };

    document.getElementById("lc-input").addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendLandingChat(); }
    });

    // ── State ──
    const API = window.location.origin;
    let token = localStorage.getItem("wr_token");
    let siteId = null;

    const dots = [1,2,3,4].map(i => document.getElementById("dot-" + i));

    // ── Navigation ──
    function go(name, step) {
        document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
        document.getElementById("s-" + name).classList.add("active");
        dots.forEach((d, i) => {
            d.classList.remove("active", "done");
            if (i < step - 1) d.classList.add("done");
            else if (i === step - 1) d.classList.add("active");
        });
    }

    function showApp() {
        document.getElementById("landing").classList.add("hidden");
        document.getElementById("app-flow").classList.add("active");
    }

    window.goLanding = function() {
        document.getElementById("landing").classList.remove("hidden");
        document.getElementById("app-flow").classList.remove("active");
    };

    window.goToRegister = function() {
        if (token) {
            showApp();
            go("trial", 2);
        } else {
            showApp();
            go("register", 1);
        }
    };

    // Auto-login if already registered — go straight to trial on CTA click
    // But stay on landing by default

    // ── Step 1: Register ──
    window.doRegister = async function() {
        const t = T[currentLang];
        const name = document.getElementById("reg-name").value.trim();
        const email = document.getElementById("reg-email").value.trim();
        const company = document.getElementById("reg-company").value.trim();
        const btn = document.getElementById("reg-btn");
        const err = document.getElementById("reg-err");

        if (!name || !email) { showErr(err, t.regErrEmpty); return; }
        if (!email.includes("@")) { showErr(err, t.regErrEmail); return; }

        btn.disabled = true;
        hideErr(err);

        try {
            const resp = await fetch(API + "/api/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, email, company }),
            });
            const data = await resp.json();
            if (!resp.ok) { showErr(err, data.error); btn.disabled = false; return; }

            token = data.token;
            localStorage.setItem("wr_token", token);
            go("trial", 2);
        } catch (e) {
            showErr(err, t.regErrNet);
            btn.disabled = false;
        }
    };

    // ── Step 2: Trial ──
    document.getElementById("t-pdfs").addEventListener("change", function() {
        const names = Array.from(this.files).map(f => f.name);
        document.getElementById("t-file-list").textContent = names.length ? names.join(", ") : "";
    });

    window.startTrial = async function() {
        const t = T[currentLang];
        const url = document.getElementById("t-url").value.trim();
        const btn = document.getElementById("t-start-btn");
        const err = document.getElementById("t-err");

        if (!url) { showErr(err, t.trialErrUrl); return; }

        btn.disabled = true;
        hideErr(err);

        const fd = new FormData();
        fd.append("url", url);
        fd.append("max_pages", document.getElementById("t-pages").value);
        fd.append("language", document.getElementById("t-lang").value);
        for (const f of document.getElementById("t-pdfs").files) fd.append("pdfs", f);

        try {
            const resp = await fetch(API + "/api/trial/start", { method: "POST", body: fd });
            const data = await resp.json();

            if (!resp.ok) { showErr(err, data.error || t.trialErrNet); btn.disabled = false; return; }

            siteId = data.site_id;
            document.getElementById("c-title").textContent = url;
            go("progress", 2);
            watchProgress(siteId);
        } catch (e) {
            showErr(err, t.trialErrNet);
            btn.disabled = false;
        }
    };

    function watchProgress(id) {
        const t = T[currentLang];
        const bar = document.getElementById("p-bar");
        const msg = document.getElementById("p-msg");
        const status = document.getElementById("p-status");
        const err = document.getElementById("p-err");

        const es = new EventSource(API + "/api/trial/progress/" + id);
        es.onmessage = (ev) => {
            const p = JSON.parse(ev.data);

            if (p.error) {
                es.close();
                status.textContent = t.progError;
                status.style.color = "var(--red)";
                msg.textContent = t.progFail;
                bar.style.width = "100%"; bar.style.background = "var(--red)"; bar.classList.remove("pulse");
                showErr(err, p.error);
                return;
            }

            msg.textContent = p.message;

            if (p.total > 0 && p.step > 0) {
                bar.classList.remove("pulse");
                bar.style.width = Math.round(p.step / p.total * 100) + "%";
                status.textContent = t.progLoading;
            }

            if (p.done) {
                es.close();
                status.textContent = t.progDone;
                status.style.color = "var(--green)";
                bar.classList.remove("pulse");
                bar.style.width = "100%";
                setTimeout(() => {
                    go("chat", 3);
                    document.getElementById("c-input").focus();
                }, 600);
            }
        };

        es.onerror = () => {
            es.close();
            status.textContent = t.progError;
            status.style.color = "var(--red)";
            msg.textContent = t.progLost;
            showErr(err, t.progLost);
        };
    }

    // ── Step 3: Chat ──
    window.sendMsg = async function() {
        const t = T[currentLang];
        const inp = document.getElementById("c-input");
        const q = inp.value.trim();
        if (!q || !siteId) return;

        inp.value = "";
        document.getElementById("c-send").disabled = true;
        addChat(q, "user");
        document.getElementById("c-typing").classList.add("on");
        scrollChat();

        try {
            const resp = await fetch(API + "/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ site_id: siteId, query: q }),
            });
            const data = await resp.json();
            addBotChat(data.answer, data.sources, data.confidence);
        } catch (e) {
            addChat(t.chatError, "bot");
        } finally {
            document.getElementById("c-typing").classList.remove("on");
            document.getElementById("c-send").disabled = false;
            inp.focus();
        }
    };

    document.getElementById("c-input").addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });

    function addChat(text, type) {
        const d = document.createElement("div");
        d.className = "msg " + type;
        d.textContent = text;
        const body = document.getElementById("c-body");
        body.insertBefore(d, document.getElementById("c-typing"));
        scrollChat();
    }

    function addBotChat(text, sources, conf) {
        const d = document.createElement("div");
        d.className = "msg bot";
        let h = text
            .replace(/&/g, "&amp;").replace(/</g, "&lt;")
            .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
            .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
            .replace(/\n/g, "<br>");
        d.innerHTML = h;
        document.getElementById("c-body").insertBefore(d, document.getElementById("c-typing"));
        scrollChat();
    }

    function scrollChat() {
        const b = document.getElementById("c-body");
        b.scrollTop = b.scrollHeight;
    }

    // ── Step 4: Activate ──
    window.goActivate = function() { go("activate", 4); };
    window.goChat = function() { go("chat", 3); };

    window.doActivate = async function() {
        const t = T[currentLang];
        const code = document.getElementById("a-code").value.trim();
        const err = document.getElementById("a-err");

        if (!code) { showErr(err, t.actErrEmpty); return; }
        hideErr(err);

        try {
            const resp = await fetch(API + "/api/activate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ code, site_id: siteId, token }),
            });
            const data = await resp.json();

            if (!resp.ok) { showErr(err, data.error); return; }

            document.getElementById("activate-form").style.display = "none";
            document.getElementById("activate-success").style.display = "block";
            document.getElementById("widget-code").textContent = data.widget_code;
        } catch (e) {
            showErr(err, t.actErrNet);
        }
    };

    window.copyCode = function() {
        const text = document.getElementById("widget-code").textContent;
        navigator.clipboard.writeText(text).then(() => {
            document.getElementById("copy-status").textContent = currentLang === "ru" ? "Скопировано!" : currentLang === "kk" ? "Көшірілді!" : "Copied!";
            setTimeout(() => document.getElementById("copy-status").textContent = "", 2000);
        });
    };

    // ── Reset ──
    window.resetAll = function() {
        siteId = null;
        document.getElementById("t-url").value = "";
        document.getElementById("t-pdfs").value = "";
        document.getElementById("t-file-list").textContent = "";
        document.getElementById("t-start-btn").disabled = false;

        const bar = document.getElementById("p-bar");
        bar.style.width = "0%"; bar.style.background = "var(--accent)"; bar.classList.add("pulse");
        document.getElementById("p-msg").textContent = T[currentLang].progStart;
        const pStatus = document.getElementById("p-status");
        pStatus.textContent = T[currentLang].progLoading;
        pStatus.style.color = "var(--text)";
        hideErr(document.getElementById("p-err"));

        document.getElementById("c-body").querySelectorAll(".msg:not(.sys)").forEach(m => m.remove());

        document.getElementById("a-code").value = "";
        document.getElementById("activate-form").style.display = "block";
        document.getElementById("activate-success").style.display = "none";
        hideErr(document.getElementById("a-err"));
        hideErr(document.getElementById("t-err"));

        go("trial", 2);
    };

    // ── Stop Trial ──
    window.stopTrial = async function() {
        const t = T[currentLang];
        if (!confirm(t.chatStopConfirm)) return;

        // Delete trial data on server
        if (siteId) {
            try {
                await fetch(API + "/api/trial/stop/" + siteId, { method: "DELETE" });
            } catch (e) {
                // ignore — we'll navigate away anyway
            }
        }

        // Reset local state
        siteId = null;
        document.getElementById("t-url").value = "";
        document.getElementById("t-pdfs").value = "";
        document.getElementById("t-file-list").textContent = "";
        document.getElementById("t-start-btn").disabled = false;
        document.getElementById("c-body").querySelectorAll(".msg:not(.sys)").forEach(m => m.remove());

        // Go back to landing
        goLanding();
    };

    // ── Helpers ──
    function showErr(el, msg) { el.textContent = msg; el.classList.add("on"); }
    function hideErr(el) { el.textContent = ""; el.classList.remove("on"); }

    // Enter keys
    document.getElementById("reg-name").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("reg-email").focus(); });
    document.getElementById("reg-email").addEventListener("keydown", e => { if (e.key === "Enter") doRegister(); });
    document.getElementById("t-url").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); startTrial(); } });
    document.getElementById("a-code").addEventListener("keydown", e => { if (e.key === "Enter") doActivate(); });
})();
</script>
</body>
</html>
