<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRAG Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f6f6f6;
            --surface: #ffffff;
            --border: #dcdce0;
            --text: #47464d;
            --text2: #7a7a85;
            --accent: #fb742d;
            --accent-hover: #fc8a4f;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Login ── */
        .login-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            width: 360px;
            text-align: center;
        }

        .login-card h1 { font-size: 20px; margin-bottom: 8px; }
        .login-card p { color: var(--text2); font-size: 13px; margin-bottom: 24px; }

        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
            background: var(--surface);
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus, select:focus { border-color: var(--accent); }
        textarea { min-height: 120px; resize: vertical; }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--accent); color: #fff; width: 100%; margin-top: 12px; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-sm { padding: 6px 14px; font-size: 13px; }

        .btn-danger { background: none; color: var(--red); border: 1px solid var(--red); }
        .btn-danger:hover { background: var(--red); color: #fff; }

        .btn-outline { background: none; color: var(--accent); border: 1px solid var(--accent); }
        .btn-outline:hover { background: var(--accent); color: #fff; }

        .btn-blue { background: var(--blue); color: #fff; }
        .btn-blue:hover { background: #2563eb; }

        .btn-green { background: var(--green); color: #fff; }
        .btn-green:hover { background: #16a34a; }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .err { color: var(--red); font-size: 13px; margin-top: 8px; }

        /* ── Dashboard ── */
        .dashboard { display: none; }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar h1 { font-size: 17px; font-weight: 700; }
        .topbar h1 span { color: var(--accent); }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: var(--text2);
        }

        .logout-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 12px;
            color: var(--text2);
            cursor: pointer;
            font-family: inherit;
        }
        .logout-btn:hover { color: var(--text); border-color: var(--text2); }

        .container { max-width: 960px; margin: 0 auto; padding: 24px; }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 2px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 3px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text2);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active { background: var(--accent); color: #fff; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
        }

        .card h3 { font-size: 15px; margin-bottom: 4px; }
        .card-meta { font-size: 12px; color: var(--text2); margin-bottom: 12px; }

        .card-text {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text);
            white-space: pre-wrap;
            max-height: 150px;
            overflow-y: auto;
        }

        .card-actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }

        /* ── Add form ── */
        .add-form {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
        }
        .add-form h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }

        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text2);
        }

        .form-row { display: flex; gap: 12px; align-items: flex-end; }
        .form-row .form-group { flex: 1; margin-bottom: 0; }

        .status-msg {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .status-msg.success { display: block; background: #dcfce7; color: #166534; }
        .status-msg.error { display: block; background: #fef2f2; color: #991b1b; }
        .status-msg.info { display: block; background: #eff6ff; color: #1e40af; }

        /* ── Sites table ── */
        .site-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .site-row:hover { border-color: var(--accent); }

        .site-info { flex: 1; }
        .site-domain { font-weight: 600; font-size: 14px; }
        .site-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

        .site-actions { display: flex; gap: 8px; align-items: center; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-trial { background: #fef9c3; color: #854d0e; }
        .badge-active { background: #dcfce7; color: #166534; }
        .badge-landing { background: #e0e7ff; color: #3730a3; }

        .empty-state { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }
        .loading { text-align: center; padding: 40px; color: var(--text2); font-size: 13px; }

        /* ── Site detail panel ── */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text2);
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            margin-bottom: 16px;
            padding: 0;
        }
        .back-btn:hover { color: var(--accent); }

        .site-header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
        }
        .site-header h2 { font-size: 18px; margin-bottom: 4px; }
        .site-header-meta { font-size: 13px; color: var(--text2); }
        .site-header-actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }

        /* ── Chatbot test panel ── */
        .chat-test {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .chat-test-header {
            padding: 14px 20px;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            height: 300px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .chat-msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
        .chat-msg.bot { align-self: flex-start; background: #f0f0f0; color: var(--text); border-bottom-left-radius: 4px; }
        .chat-msg .conf-badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; display: inline-block; }
        .chat-msg .conf-badge.high { background: #dcfce7; color: #166534; }
        .chat-msg .conf-badge.medium { background: #fef9c3; color: #854d0e; }
        .chat-msg .conf-badge.low { background: #fecaca; color: #991b1b; }

        .chat-input-row { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
        .chat-input-row input { flex: 1; }
        .chat-input-row button { width: auto; margin-top: 0; padding: 10px 16px; }

        /* ── Document/chunk list ── */
        .doc-section { margin-bottom: 16px; }
        .doc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
        }
        .doc-header:hover { border-color: var(--accent); }
        .doc-header-info h4 { font-size: 14px; font-weight: 600; }
        .doc-header-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

        .doc-chunks {
            display: none;
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 10px 10px;
            background: var(--surface);
        }
        .doc-chunks.open { display: block; }
        .doc-header.expanded { border-radius: 10px 10px 0 0; }

        .chunk-item {
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .chunk-item:last-child { border-bottom: none; }
        .chunk-text {
            flex: 1;
            font-size: 12px;
            line-height: 1.6;
            color: var(--text2);
            max-height: 80px;
            overflow: hidden;
        }
        .chunk-idx { font-size: 11px; color: var(--text2); white-space: nowrap; min-width: 30px; }

        /* ── Progress bar ── */
        .progress-bar {
            height: 4px;
            background: #eee;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }

        /* ── File input ── */
        .file-input-wrap {
            position: relative;
            display: inline-block;
        }
        .file-input-wrap input[type="file"] {
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- ── Login screen ── -->
<div class="login-wrap" id="login-screen">
    <div class="login-card">
        <h1>Web<span style="color:var(--accent)">RAG</span> Admin</h1>
        <p>Enter admin code to continue</p>
        <input type="password" id="admin-code" placeholder="Admin code" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="btn btn-primary" onclick="doLogin()">Enter</button>
        <div class="err" id="login-err"></div>
    </div>
</div>

<!-- ── Dashboard ── -->
<div class="dashboard" id="dashboard">
    <div class="topbar">
        <h1>Web<span>RAG</span> Admin</h1>
        <div class="topbar-right">
            <span id="site-count"></span>
            <button class="logout-btn" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('docs')">Landing Content</button>
            <button class="tab-btn" onclick="switchTab('sites')">All Sites</button>
        </div>

        <!-- Tab: Landing content -->
        <div class="tab-content active" id="tab-docs">
            <div class="add-form">
                <h3>Add new content</h3>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="doc-title" placeholder="e.g. Pricing info">
                </div>
                <div class="form-group">
                    <label>Content</label>
                    <textarea id="doc-text" placeholder="Write the information text here. It will be chunked and embedded into the RAG."></textarea>
                </div>
                <button class="btn btn-primary btn-sm" style="width:auto" onclick="addDocument()">Add & Index</button>
            </div>

            <div class="status-msg" id="doc-status"></div>
            <div id="doc-list"><div class="loading">Loading documents...</div></div>
        </div>

        <!-- Tab: Sites list -->
        <div class="tab-content" id="tab-sites">
            <div id="sites-list"><div class="loading">Loading sites...</div></div>
        </div>

        <!-- Tab: Site detail (hidden initially) -->
        <div class="tab-content" id="tab-site-detail"></div>
    </div>
</div>

<script>
const API = window.location.origin;
let adminToken = sessionStorage.getItem("wr_admin") || "";

// ── Auth ──

async function doLogin() {
    const code = document.getElementById("admin-code").value.trim();
    if (!code) return;

    const resp = await fetch(API + "/api/admin/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code }),
    });
    const data = await resp.json();

    if (data.success) {
        adminToken = data.token;
        sessionStorage.setItem("wr_admin", adminToken);
        showDashboard();
    } else {
        document.getElementById("login-err").textContent = data.error || "Invalid code";
    }
}

function doLogout() {
    adminToken = "";
    sessionStorage.removeItem("wr_admin");
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("login-screen").style.display = "flex";
}

async function showDashboard() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadDocuments();
    loadSites();
}

function authHeaders() {
    return { "Content-Type": "application/json", "X-Admin-Token": adminToken };
}

// ── Tabs ──

function switchTab(tab) {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));

    if (tab === "docs") {
        document.querySelectorAll(".tab-btn")[0].classList.add("active");
        document.getElementById("tab-docs").classList.add("active");
    } else if (tab === "sites") {
        document.querySelectorAll(".tab-btn")[1].classList.add("active");
        document.getElementById("tab-sites").classList.add("active");
    } else if (tab === "site-detail") {
        // No tab button highlighted — detail is a sub-view of sites
        document.getElementById("tab-site-detail").classList.add("active");
    }
}

// ── Landing documents ──

async function loadDocuments() {
    const resp = await fetch(API + "/api/admin/documents", { headers: authHeaders() });
    if (resp.status === 401) { doLogout(); return; }
    const data = await resp.json();

    const list = document.getElementById("doc-list");
    if (!data.documents || data.documents.length === 0) {
        list.innerHTML = '<div class="empty-state">No documents yet</div>';
        return;
    }

    list.innerHTML = data.documents.map(doc => `
        <div class="card">
            <h3>${esc(doc.title)}</h3>
            <div class="card-meta">ID: ${doc.id} &middot; ${doc.chunk_count} chunk(s)</div>
            <div class="card-text">${esc(doc.preview)}</div>
            <div class="card-actions">
                <button class="btn btn-sm btn-danger" onclick="deleteDocument(${doc.id}, '${esc(doc.title)}')">Delete</button>
            </div>
        </div>
    `).join("");
}

async function addDocument() {
    const title = document.getElementById("doc-title").value.trim();
    const text = document.getElementById("doc-text").value.trim();
    const status = document.getElementById("doc-status");

    if (!title || !text) {
        status.className = "status-msg error";
        status.textContent = "Title and content are required.";
        return;
    }

    status.className = "status-msg info";
    status.textContent = "Indexing...";

    const resp = await fetch(API + "/api/admin/documents", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({ title, text }),
    });

    if (resp.status === 401) { doLogout(); return; }
    const data = await resp.json();

    if (data.success) {
        status.className = "status-msg success";
        status.textContent = `Added "${title}" - ${data.chunks} chunk(s) indexed.`;
        document.getElementById("doc-title").value = "";
        document.getElementById("doc-text").value = "";
        loadDocuments();
    } else {
        status.className = "status-msg error";
        status.textContent = data.error || "Failed to add document.";
    }
}

async function deleteDocument(docId, title) {
    if (!confirm(`Delete "${title}"? This will remove it from the RAG.`)) return;
    const resp = await fetch(API + `/api/admin/documents/${docId}`, { method: "DELETE", headers: authHeaders() });
    if (resp.status === 401) { doLogout(); return; }
    loadDocuments();
}

// ── Sites list ──

async function loadSites() {
    const resp = await fetch(API + "/api/admin/sites", { headers: authHeaders() });
    if (resp.status === 401) { doLogout(); return; }
    const data = await resp.json();

    document.getElementById("site-count").textContent = `${data.sites.length} site(s)`;

    const list = document.getElementById("sites-list");
    if (!data.sites || data.sites.length === 0) {
        list.innerHTML = '<div class="empty-state">No sites yet</div>';
        return;
    }

    list.innerHTML = data.sites.map(s => {
        let badge = '';
        if (s.is_landing) badge = '<span class="badge badge-landing">Landing</span>';
        else if (s.is_trial) badge = '<span class="badge badge-trial">Trial</span>';
        else badge = '<span class="badge badge-active">Active</span>';

        return `
            <div class="site-row" onclick="openSiteDetail(${s.id})">
                <div class="site-info">
                    <div class="site-domain">${esc(s.domain)} ${badge}</div>
                    <div class="site-meta">ID: ${s.id} &middot; ${s.doc_count} doc(s) &middot; Lang: ${s.language || 'auto'}</div>
                </div>
                <div class="site-actions" onclick="event.stopPropagation()">
                    ${s.is_landing ? '' : `<button class="btn btn-sm btn-danger" onclick="deleteSite(${s.id}, '${esc(s.domain)}')">Delete</button>`}
                    <button class="btn btn-sm btn-outline" onclick="openSiteDetail(${s.id})">Manage &rarr;</button>
                </div>
            </div>
        `;
    }).join("");
}

async function deleteSite(siteId, domain) {
    if (!confirm(`Delete site "${domain}" and ALL its documents/chunks? This cannot be undone.`)) return;
    const resp = await fetch(API + `/api/admin/sites/${siteId}`, { method: "DELETE", headers: authHeaders() });
    if (resp.status === 401) { doLogout(); return; }
    const data = await resp.json();
    if (data.success) loadSites();
    else alert(data.error || "Failed to delete site");
}

// ── Site detail ──

let currentSiteId = null;
let chatSessionId = null;

async function openSiteDetail(siteId) {
    currentSiteId = siteId;
    chatSessionId = "admin_test_" + siteId + "_" + Date.now();
    switchTab("site-detail");

    const container = document.getElementById("tab-site-detail");
    container.innerHTML = '<div class="loading">Loading site details...</div>';

    const resp = await fetch(API + `/api/admin/sites/${siteId}/documents`, { headers: authHeaders() });
    if (resp.status === 401) { doLogout(); return; }
    if (!resp.ok) {
        container.innerHTML = `<div class="empty-state">Error loading site</div>`;
        return;
    }

    const data = await resp.json();
    const site = data.site;
    const docs = data.documents || [];
    const settings = site.settings || {};
    const sourceUrl = settings.source_url || `https://${site.domain}`;

    let badge = '';
    if (settings.landing) badge = '<span class="badge badge-landing">Landing</span>';
    else if (site.is_trial) badge = '<span class="badge badge-trial">Trial</span>';
    else badge = '<span class="badge badge-active">Active</span>';

    const totalChunks = docs.reduce((sum, d) => sum + d.chunk_count, 0);

    container.innerHTML = `
        <button class="back-btn" onclick="switchTab('sites')">&larr; Back to all sites</button>

        <!-- Site header -->
        <div class="site-header">
            <h2>${esc(site.domain)} ${badge}</h2>
            <div class="site-header-meta">
                Site ID: ${site.id} &middot; ${docs.length} document(s) &middot; ${totalChunks} chunk(s) &middot; Language: ${site.language || 'auto'}
            </div>
            <div class="site-header-meta" style="margin-top:4px">
                Source URL: <a href="${esc(sourceUrl)}" target="_blank" style="color:var(--accent)">${esc(sourceUrl)}</a>
                &middot; Widget code: <code style="background:#f0f0f0;padding:2px 6px;border-radius:4px;font-size:11px">&lt;script src="${esc(API)}/widget.js" data-site-id="${site.id}"&gt;&lt;/script&gt;</code>
            </div>
            <div class="site-header-actions">
                <button class="btn btn-sm btn-blue" onclick="showRecrawlForm()">Re-crawl Site</button>
                <div class="file-input-wrap">
                    <button class="btn btn-sm btn-green">Upload PDF</button>
                    <input type="file" accept=".pdf" onchange="uploadPdf(this.files[0])">
                </div>
            </div>
        </div>

        <!-- Re-crawl form (hidden) -->
        <div class="add-form" id="recrawl-form" style="display:none">
            <h3>Re-crawl Site</h3>
            <p style="font-size:12px;color:var(--text2);margin-bottom:14px">This will delete all existing documents and chunks, then re-crawl from the URL.</p>
            <div class="form-row">
                <div class="form-group">
                    <label>URL</label>
                    <input type="text" id="recrawl-url" value="${esc(sourceUrl)}">
                </div>
                <div class="form-group" style="max-width:100px">
                    <label>Max pages</label>
                    <input type="number" id="recrawl-pages" value="100" min="1" max="300">
                </div>
            </div>
            <div style="margin-top:12px;display:flex;gap:8px">
                <button class="btn btn-sm btn-blue" id="recrawl-btn" onclick="doRecrawl()">Start Re-crawl</button>
                <button class="btn btn-sm btn-outline" onclick="document.getElementById('recrawl-form').style.display='none'">Cancel</button>
            </div>
            <div class="status-msg" id="recrawl-status" style="margin-top:12px"></div>
        </div>

        <!-- Upload status -->
        <div class="status-msg" id="upload-status"></div>

        <!-- Chatbot test -->
        <div class="chat-test">
            <div class="chat-test-header">
                <span>Test Chatbot</span>
                <button class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:#fff;border:none;padding:4px 10px;font-size:11px" onclick="clearChat()">Clear</button>
            </div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-row">
                <input type="text" id="chat-input" placeholder="Ask a question about this site..." onkeydown="if(event.key==='Enter')sendTestChat()">
                <button class="btn btn-sm btn-primary" style="width:auto;margin-top:0" onclick="sendTestChat()" id="chat-send-btn">Send</button>
            </div>
        </div>

        <!-- Documents & chunks -->
        <h3 style="margin: 20px 0 12px; font-size: 15px;">Documents & Chunks</h3>
        <div id="site-docs-list">
            ${docs.length === 0
                ? '<div class="empty-state">No documents indexed yet</div>'
                : docs.map(doc => renderDocSection(doc, site.id)).join("")
            }
        </div>
    `;
}

function renderDocSection(doc, siteId) {
    const chunks = (doc.chunks || []);
    return `
        <div class="doc-section">
            <div class="doc-header" onclick="toggleDocChunks(this)" id="doc-header-${doc.id}">
                <div class="doc-header-info">
                    <h4>${esc(doc.title)}</h4>
                    <div class="doc-header-meta">${esc(doc.url)} &middot; ${doc.chunk_count} chunk(s) ${doc.last_crawled ? '&middot; Crawled: ' + new Date(doc.last_crawled).toLocaleDateString() : ''}</div>
                </div>
                <span style="color:var(--text2);font-size:12px">${chunks.length > 0 ? 'Click to expand' : 'No chunks'}</span>
            </div>
            <div class="doc-chunks" id="doc-chunks-${doc.id}">
                ${chunks.map(c => `
                    <div class="chunk-item" id="chunk-${c.id}">
                        <span class="chunk-idx">#${c.chunk_index}</span>
                        <div class="chunk-text">${esc(c.preview)}</div>
                        <button class="btn btn-sm btn-danger" onclick="deleteChunk(${siteId}, ${c.id}, ${doc.id})" style="flex-shrink:0">Delete</button>
                    </div>
                `).join("")}
            </div>
        </div>
    `;
}

function toggleDocChunks(headerEl) {
    const docId = headerEl.id.replace("doc-header-", "");
    const chunksEl = document.getElementById("doc-chunks-" + docId);
    const isOpen = chunksEl.classList.contains("open");
    chunksEl.classList.toggle("open", !isOpen);
    headerEl.classList.toggle("expanded", !isOpen);
}

function showRecrawlForm() {
    document.getElementById("recrawl-form").style.display = "block";
    document.getElementById("recrawl-status").className = "status-msg";
}

// ── Site actions ──

async function doRecrawl() {
    const url = document.getElementById("recrawl-url").value.trim();
    const maxPages = parseInt(document.getElementById("recrawl-pages").value) || 100;
    const status = document.getElementById("recrawl-status");
    const btn = document.getElementById("recrawl-btn");

    if (!url) { status.className = "status-msg error"; status.textContent = "URL is required"; return; }
    if (!confirm("This will DELETE all existing documents/chunks and re-crawl. Continue?")) return;

    btn.disabled = true;
    status.className = "status-msg info";
    status.textContent = "Starting re-crawl...";

    try {
        const resp = await fetch(API + `/api/admin/sites/${currentSiteId}/recrawl`, {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify({ url, max_pages: maxPages }),
        });
        if (resp.status === 401) { doLogout(); return; }
        const data = await resp.json();

        if (data.success) {
            status.className = "status-msg success";
            status.textContent = "Re-crawl started! This may take a few minutes. Refresh the page to see results.";
            // Start polling progress
            pollProgress(currentSiteId, status);
        } else {
            status.className = "status-msg error";
            status.textContent = data.error || "Failed to start re-crawl";
        }
    } catch (e) {
        status.className = "status-msg error";
        status.textContent = "Network error: " + e.message;
    } finally {
        btn.disabled = false;
    }
}

async function pollProgress(siteId, statusEl) {
    try {
        const evtSource = new EventSource(API + `/api/trial/progress/${siteId}`);
        evtSource.onmessage = (event) => {
            const progress = JSON.parse(event.data);
            if (progress.error) {
                statusEl.className = "status-msg error";
                statusEl.textContent = "Error: " + progress.error;
                evtSource.close();
                return;
            }
            statusEl.className = "status-msg info";
            statusEl.textContent = progress.message || "Processing...";
            if (progress.done) {
                statusEl.className = "status-msg success";
                statusEl.textContent = progress.message || "Done!";
                evtSource.close();
                // Reload the site detail after a short delay
                setTimeout(() => openSiteDetail(siteId), 1000);
            }
        };
        evtSource.onerror = () => { evtSource.close(); };
    } catch (e) {
        // Fallback: just tell user to refresh
    }
}

async function uploadPdf(file) {
    if (!file) return;
    const status = document.getElementById("upload-status");
    status.className = "status-msg info";
    status.textContent = `Uploading and indexing "${file.name}"...`;

    const formData = new FormData();
    formData.append("pdf", file);

    try {
        const resp = await fetch(API + `/api/admin/sites/${currentSiteId}/upload-pdf`, {
            method: "POST",
            headers: { "X-Admin-Token": adminToken },
            body: formData,
        });
        if (resp.status === 401) { doLogout(); return; }
        const data = await resp.json();

        if (data.success) {
            status.className = "status-msg success";
            status.textContent = `Uploaded "${data.filename}" - ${data.chunks} chunk(s) indexed.`;
            // Reload site detail to show new document
            setTimeout(() => openSiteDetail(currentSiteId), 500);
        } else {
            status.className = "status-msg error";
            status.textContent = data.error || "Failed to upload PDF";
        }
    } catch (e) {
        status.className = "status-msg error";
        status.textContent = "Network error: " + e.message;
    }
}

async function deleteChunk(siteId, chunkId, docId) {
    if (!confirm("Delete this chunk? This may affect chatbot answers.")) return;

    const resp = await fetch(API + `/api/admin/sites/${siteId}/chunks/${chunkId}`, {
        method: "DELETE",
        headers: authHeaders(),
    });
    if (resp.status === 401) { doLogout(); return; }
    const data = await resp.json();
    if (data.success) {
        // Remove the chunk element from the DOM
        const el = document.getElementById("chunk-" + chunkId);
        if (el) el.remove();
    } else {
        alert(data.error || "Failed to delete chunk");
    }
}

// ── Test chatbot ──

function clearChat() {
    document.getElementById("chat-messages").innerHTML = "";
    chatSessionId = "admin_test_" + currentSiteId + "_" + Date.now();
}

async function sendTestChat() {
    const input = document.getElementById("chat-input");
    const query = input.value.trim();
    if (!query) return;

    const messages = document.getElementById("chat-messages");
    const sendBtn = document.getElementById("chat-send-btn");

    // Add user message
    const userMsg = document.createElement("div");
    userMsg.className = "chat-msg user";
    userMsg.textContent = query;
    messages.appendChild(userMsg);

    input.value = "";
    sendBtn.disabled = true;
    messages.scrollTop = messages.scrollHeight;

    // Add typing indicator
    const typingEl = document.createElement("div");
    typingEl.className = "chat-msg bot";
    typingEl.style.color = "var(--text2)";
    typingEl.textContent = "Thinking...";
    messages.appendChild(typingEl);
    messages.scrollTop = messages.scrollHeight;

    try {
        const resp = await fetch(API + "/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                site_id: currentSiteId,
                query: query,
                session_id: chatSessionId,
                origin_domain: window.location.hostname,
            }),
        });
        const data = await resp.json();

        // Replace typing indicator with real response
        let html = "";
        if (data.confidence) {
            html += `<span class="conf-badge ${data.confidence}">${data.confidence}</span><br>`;
        }
        html += esc(data.answer || data.error || "No response").replace(/\n/g, "<br>");

        if (data.sources && data.sources.length > 0) {
            html += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid #ddd;font-size:11px;color:var(--text2)"><strong>Sources:</strong>`;
            data.sources.forEach((s, i) => {
                html += `<div><a href="${esc(s.url)}" target="_blank" style="color:var(--accent)">[${i+1}] ${esc(s.title)} (${s.score})</a></div>`;
            });
            html += `</div>`;
        }

        typingEl.innerHTML = html;
        typingEl.style.color = "";
    } catch (e) {
        typingEl.textContent = "Error: " + e.message;
        typingEl.style.color = "var(--red)";
    } finally {
        sendBtn.disabled = false;
        input.focus();
        messages.scrollTop = messages.scrollHeight;
    }
}

// ── Helpers ──

function esc(str) {
    if (!str) return "";
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ── Init ──

if (adminToken) {
    fetch(API + "/api/admin/sites", { headers: authHeaders() })
        .then(r => { if (r.ok) showDashboard(); else doLogout(); })
        .catch(() => doLogout());
}
</script>
